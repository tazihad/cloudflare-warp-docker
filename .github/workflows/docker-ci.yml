name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The warp version you want to build"
        required: true
      latest:
        description: "tag as latest"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_REPO }}
        sep-labels: ','

    # Updated to use modern $GITHUB_OUTPUT instead of deprecated ::set-output
    - name: Docker tag
      id: tag
      run: |
        VERSION=${{ github.event.inputs.version }}
        if [[ "${{ github.event.inputs.latest }}" == "true" ]]; then 
          VERSION="$VERSION,latest"
        fi
        echo "tag=$VERSION" >> $GITHUB_OUTPUT
        
        LABELS=$(echo "${{ steps.meta.outputs.labels }}" | sed -e 's/\s/-/g')
        echo "labels=$LABELS" >> $GITHUB_OUTPUT

    # Setup Buildx Engine
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Log in to Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Modern Build and Push step replacing mr-smithers-excellent
    - name: Docker Build & Push Version
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # We parse your comma-separated list of tags and append them to the repo secret
        tags: |
          docker.io/${{ secrets.DOCKERHUB_REPO }}:${{ github.event.inputs.version }}
          ${{ github.event.inputs.latest == true && format('docker.io/{0}:latest', secrets.DOCKERHUB_REPO) || '' }}
        labels: ${{ steps.tag.outputs.labels }}
        build-args: |
          VERSION=${{ github.event.inputs.version }}