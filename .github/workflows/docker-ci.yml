name: Automated Docker Image CI

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00 UTC
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Compare Upstream and Docker Hub Versions
      id: version-check
      run: |
        # 1. Fetch the latest version from Cloudflare upstream
        UPSTREAM_VERSION=$(curl -sL https://pkg.cloudflareclient.com/dists/trixie/main/binary-amd64/Packages | grep -E "^Version:" | head -n 1 | awk '{print $2}' | tr -d '\r')
        echo "Latest Cloudflare Upstream Version: '$UPSTREAM_VERSION'"
        
        # 2. Check if the tag already exists on Docker Hub
        # This calls Docker Hub's public API for your repository tags
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_REPO }}/tags/${UPSTREAM_VERSION}/")
        
        # If Docker Hub returns a 200 OK, the tag already exists.
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Version $UPSTREAM_VERSION already exists on Docker Hub. Skipping build."
          echo "NEW_VERSION_FOUND=false" >> $GITHUB_OUTPUT
        else
          echo "Version $UPSTREAM_VERSION not found on Docker Hub (HTTP $HTTP_STATUS). Triggering build!"
          echo "NEW_VERSION_FOUND=true" >> $GITHUB_OUTPUT
          echo "VERSION=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Checkout code
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Docker meta
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_REPO }}
        sep-labels: ','

    - name: Docker tag
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      id: tag
      run: |
        LABELS=$(echo "${{ steps.meta.outputs.labels }}" | sed -e 's/\s/-/g')
        echo "labels=$LABELS" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker Build & Push Version
      if: steps.version-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          docker.io/${{ secrets.DOCKERHUB_REPO }}:${{ steps.version-check.outputs.VERSION }}
          docker.io/${{ secrets.DOCKERHUB_REPO }}:latest
        labels: ${{ steps.tag.outputs.labels }}
        build-args: |
          VERSION=${{ steps.version-check.outputs.VERSION }}