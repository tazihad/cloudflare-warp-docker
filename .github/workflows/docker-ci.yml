name: Docker Image CI

on:
  schedule:
    - cron: '0 0 * * 0' # Runs automatically every Sunday at 00:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "The warp version you want to build"
        required: true

jobs:
  # NEW JOB: Only checks if an update is needed
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      version: ${{ steps.compare.outputs.version }}
    steps:
    - name: Check Cloudflare vs Docker Hub
      id: compare
      run: |
        # 1. Get version from manual input if run manually, otherwise fetch from upstream
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "Manual trigger detected."
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          UPSTREAM_VERSION=$(curl -sL https://pkg.cloudflareclient.com/dists/trixie/main/binary-amd64/Packages | grep -E "^Version:" | head -n 1 | awk '{print $2}' | tr -d '\r')
          echo "Latest Upstream Version: $UPSTREAM_VERSION"
          
          # Check if tag already exists on Docker Hub
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_REPO }}/tags/${UPSTREAM_VERSION}/")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version matches Docker Hub. Skipping automated build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version found or repo empty. Starting automated build."
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          fi
        fi

  # YOUR EXACT BUILD JOB (Unchanged, just uses the version output from above)
  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_REPO }}
        sep-labels: ','

    # Generates your clean labels output
    - name: Docker tag
      id: tag
      run: |
        LABELS=$(echo "${{ steps.meta.outputs.labels }}" | sed -e 's/\s/-/g')
        echo "labels=$LABELS" >> $GITHUB_OUTPUT

    # Setup Buildx Engine
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Log in to Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Modern Build and Push step (Always pushes to version AND latest)
    - name: Docker Build & Push Version
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # This block now unconditionally pushes both tags every single time
        tags: |
          docker.io/${{ secrets.DOCKERHUB_REPO }}:${{ needs.check-version.outputs.version }}
          docker.io/${{ secrets.DOCKERHUB_REPO }}:latest
        labels: ${{ steps.tag.outputs.labels }}
        build-args: |
          VERSION=${{ needs.check-version.outputs.version }}