name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The warp version you want to build"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_REPO }}
        sep-labels: ','

    # Generates your clean labels output
    - name: Docker tag
      id: tag
      run: |
        LABELS=$(echo "${{ steps.meta.outputs.labels }}" | sed -e 's/\s/-/g')
        echo "labels=$LABELS" >> $GITHUB_OUTPUT

    # Setup Buildx Engine
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Log in to Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Modern Build and Push step (Always pushes to version AND latest)
    - name: Docker Build & Push Version
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # This block now unconditionally pushes both tags every single time
        tags: |
          docker.io/${{ secrets.DOCKERHUB_REPO }}:${{ github.event.inputs.version }}
          docker.io/${{ secrets.DOCKERHUB_REPO }}:latest
        labels: ${{ steps.tag.outputs.labels }}
        build-args: |
          VERSION=${{ github.event.inputs.version }}