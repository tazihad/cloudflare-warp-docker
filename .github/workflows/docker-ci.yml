name: Automated Docker Image CI

on:
  schedule:
    # Runs every Sunday at 00:00 UTC (Adjust cron expression as needed)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Kept just in case you ever want to force a manual run

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch latest Cloudflare Warp version
      id: warp-check
      run: |
        # Fetch the latest version from the repository upstream
        UPSTREAM_VERSION=$(curl -sL https://pkg.cloudflareclient.com/dists/trixie/main/binary-amd64/Packages | grep -E "^Version:" | head -n 1 | awk '{print $2}')
        echo "Upstream version found: $UPSTREAM_VERSION"
        
        # Get the last built version stored in GitHub Repo Variables
        LAST_BUILT_VERSION="${{ vars.LAST_BUILT_WARP_VERSION }}"
        echo "Last built version in records: $LAST_BUILT_VERSION"
        
        # Compare versions
        if [ "$UPSTREAM_VERSION" = "$LAST_BUILT_VERSION" ]; then
          echo "No new version found. Skipping build."
          echo "NEW_VERSION_FOUND=false" >> $GITHUB_OUTPUT
        else
          echo "New version detected! Preparing build for version $UPSTREAM_VERSION..."
          echo "NEW_VERSION_FOUND=true" >> $GITHUB_OUTPUT
          echo "VERSION=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Checkout code
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Docker meta
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_REPO }}
        sep-labels: ','

    - name: Docker tag
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      id: tag
      run: |
        LABELS=$(echo "${{ steps.meta.outputs.labels }}" | sed -e 's/\s/-/g')
        echo "labels=$LABELS" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Docker Build & Push Version
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          docker.io/${{ secrets.DOCKERHUB_REPO }}:${{ steps.warp-check.outputs.VERSION }}
          docker.io/${{ secrets.DOCKERHUB_REPO }}:latest
        labels: ${{ steps.tag.outputs.labels }}
        build-args: |
          VERSION=${{ steps.warp-check.outputs.VERSION }}

    # Dynamically update the repo variable so next week it knows this version is done
    - name: Update Last Built Version Variable
      if: steps.warp-check.outputs.NEW_VERSION_FOUND == 'true' && success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api \
          --method PATCH \
          -H "Accept: application/vnd.github+json" \
          /repos/${{ github.repository }}/actions/variables/LAST_BUILT_WARP_VERSION \
          -f name='LAST_BUILT_WARP_VERSION' \
          -f value='${{ steps.warp-check.outputs.VERSION }}'